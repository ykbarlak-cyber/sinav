<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EduQuiz - Supabase İşlevsel Sınav</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/supabase.min.js"></script>
<style>
body{font-family:sans-serif;background:#f5f3ee;margin:0;padding:0;}
nav{padding:10px 20px;background:#fff;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #ccc;}
h1,h2,h3{margin:0 0 10px 0;}
.container{max-width:900px;margin:20px auto;padding:0 20px;}
button{cursor:pointer;padding:8px 14px;border:none;border-radius:6px;background:#c8401a;color:#fff;margin:2px;}
input,select,textarea{padding:8px;border:1px solid #ccc;border-radius:6px;width:100%;margin:4px 0;}
.screen{display:none;}
.screen.active{display:block;}
.quiz-card{border:1px solid #ccc;border-radius:10px;padding:14px;margin-bottom:12px;}
.option-row{padding:8px;border:1px solid #ccc;margin:4px 0;border-radius:6px;cursor:pointer;}
.option-row.sel{background:#c8401a;color:#fff;}
.result{border:1px solid #16a34a;padding:14px;border-radius:8px;margin-top:14px;background:#e6ffe6;}
</style>
</head>
<body>

<nav>
  <div>EduQuiz</div>
  <button onclick="showScreen('landing')">Ana Sayfa</button>
</nav>

<div class="container">

<!-- SETUP -->
<div class="screen active" id="setup">
<h2>Supabase Bağlantısı</h2>
<p>Proje URL ve Anon Key girin:</p>
<input type="text" id="supabaseUrl" placeholder="Supabase Project URL">
<input type="text" id="supabaseKey" placeholder="Supabase Anon Key">
<input type="password" id="teacherPw" placeholder="Öğretmen Şifresi" value="1234">
<button onclick="initSupabase()">Başlat</button>
</div>

<!-- LANDING -->
<div class="screen" id="landing">
<h2>Hoşgeldiniz</h2>
<button onclick="showScreen('teacherLogin')">👩‍🏫 Öğretmen</button>
<button onclick="showScreen('studentSelect')">🎓 Öğrenci</button>
</div>

<!-- TEACHER LOGIN -->
<div class="screen" id="teacherLogin">
<h2>Öğretmen Girişi</h2>
<input type="password" id="pwInput" placeholder="Şifre">
<button onclick="checkPw()">Giriş</button>
</div>

<!-- TEACHER DASHBOARD -->
<div class="screen" id="teacher">
<h2>Öğretmen Paneli</h2>
<button onclick="renderQuizzes()">Sınavları Göster</button>
<button onclick="showAddQuiz()">Yeni Sınav Ekle</button>
<div id="teacherContent"></div>
</div>

<!-- ADD QUIZ -->
<div class="screen" id="addQuiz">
<h2>Yeni Sınav Oluştur</h2>
<input type="text" id="quizTitle" placeholder="Sınav Başlığı">
<input type="number" id="quizTime" placeholder="Süre (dakika)">
<button onclick="saveQuiz()">Kaydet</button>
</div>

<!-- STUDENT SELECT -->
<div class="screen" id="studentSelect">
<h2>Öğrenci Paneli</h2>
<input type="text" id="studentName" placeholder="Adınız">
<select id="quizSelect"></select>
<button onclick="startQuiz()">Başla</button>
</div>

<!-- QUIZ -->
<div class="screen" id="quizScreen">
<h2 id="quizTitleStudent"></h2>
<div id="quizArea"></div>
<button onclick="submitQuiz()">Gönder</button>
</div>

<!-- RESULT -->
<div class="screen" id="resultScreen">
<h2>Sonuç</h2>
<div id="resultArea"></div>
</div>

</div>

<script>
// ══════════ SUPABASE BAĞLANTI ══════════
let supabase;
let teacherPassword;
let currentQuiz, studentAnswers=[], studentName;

function initSupabase(){
  const url = document.getElementById('supabaseUrl').value.trim();
  const key = document.getElementById('supabaseKey').value.trim();
  teacherPassword = document.getElementById('teacherPw').value;
  if(!url||!key){alert('URL ve Key gerekli'); return;}
  supabase = Supabase.createClient(url,key);
  alert('Supabase bağlantısı başarılı!');
  showScreen('landing');
}

// ══════════ SCREEN SWITCH ══════════
function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// ══════════ TEACHER LOGIN ══════════
function checkPw(){
  const pw = document.getElementById('pwInput').value;
  if(pw===teacherPassword){ showScreen('teacher'); renderQuizzes(); }
  else alert('Yanlış şifre!');
}

// ══════════ TEACHER FUNCTIONS ══════════
async function renderQuizzes(){
  const {data,error} = await supabase.from('quizzes').select('*');
  const container = document.getElementById('teacherContent');
  container.innerHTML='';
  if(error){container.innerText='Hata: '+error.message; return;}
  data.forEach(q=>{
    const div = document.createElement('div');
    div.className='quiz-card';
    div.innerHTML=`${q.name} (${q.time_limit} dk)
      <button onclick="editQuiz('${q.id}')">Düzenle</button>
      <button onclick="deleteQuiz('${q.id}')">Sil</button>`;
    container.appendChild(div);
  });
}
function showAddQuiz(){ showScreen('addQuiz'); }
async function saveQuiz(){
  const name = document.getElementById('quizTitle').value.trim();
  const time = parseInt(document.getElementById('quizTime').value)||0;
  if(!name){alert('Başlık gerekli'); return;}
  await supabase.from('quizzes').insert({name:name,time_limit:time});
  alert('Sınav kaydedildi');
  showScreen('teacher');
  renderQuizzes();
}
async function deleteQuiz(id){
  if(!confirm('Silinsin mi?')) return;
  await supabase.from('quizzes').delete().eq('id',id);
  renderQuizzes();
}

// ══════════ STUDENT FUNCTIONS ══════════
async function startQuiz(){
  studentName=document.getElementById('studentName').value.trim();
  if(!studentName){alert('Adınızı girin'); return;}
  const quizId=document.getElementById('quizSelect').value;
  const {data,error}=await supabase.from('quizzes').select('*').eq('id',quizId).single();
  if(error){alert('Hata: '+error.message); return;}
  currentQuiz=data;
  studentAnswers=[];
  showScreen('quizScreen');
  renderStudentQuiz();
}
async function renderStudentQuiz(){
  document.getElementById('quizTitleStudent').innerText=currentQuiz.name;
  const area=document.getElementById('quizArea');
  area.innerHTML='';
  if(!currentQuiz.questions || currentQuiz.questions.length===0){ area.innerText='Sorular yok.'; return;}
  currentQuiz.questions.forEach((q,i)=>{
    const div=document.createElement('div');
    div.className='quiz-card';
    div.innerHTML=`<div>${i+1}. ${q.text}</div>`;
    q.options.forEach((opt,j)=>{
      const btn=document.createElement('div');
      btn.className='option-row';
      btn.innerText=opt;
      btn.onclick=()=>{studentAnswers[i]=j; renderStudentQuiz();}
      if(studentAnswers[i]===j) btn.classList.add('sel');
      div.appendChild(btn);
    });
    area.appendChild(div);
  });
}
async function submitQuiz(){
  let correct=0;
  currentQuiz.questions.forEach((q,i)=>{
    if(studentAnswers[i]===q.answer) correct++;
  });
  const score=Math.round((correct/currentQuiz.questions.length)*100);
  await supabase.from('results').insert({student_name:studentName,quiz_id:currentQuiz.id,score:score,answers:studentAnswers});
  showScreen('resultScreen');
  document.getElementById('resultArea').innerHTML=`<div class="result">${studentName}, Puanınız: ${score}% (${correct}/${currentQuiz.questions.length})</div>`;
}

// ══════════ POPULATE STUDENT QUIZ LIST ══════════
async function populateStudentQuizzes(){
  const {data,error}=await supabase.from('quizzes').select('*');
  const sel=document.getElementById('quizSelect');
  sel.innerHTML='';
  if(data) data.forEach(q=>{const opt=document.createElement('option'); opt.value=q.id; opt.innerText=q.name; sel.appendChild(opt);});
}
document.getElementById('studentSelect').addEventListener('click',populateStudentQuizzes);

</script>
</body>
</html>
