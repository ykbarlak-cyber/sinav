```html
<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pozitif Eğitim - Akıllı Quiz Sistemi</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
:root{
  --bg:#0f172a;
  --card:#1e293b;
  --primary:#22c55e;
  --secondary:#334155;
  --text:#e2e8f0;
  --danger:#ef4444;
}

*{box-sizing:border-box}

body{
  margin:0;
  font-family:system-ui;
  background:var(--bg);
  color:var(--text);
}

.container{
  max-width:900px;
  margin:auto;
  padding:20px;
}

.card{
  background:var(--card);
  border-radius:12px;
  padding:20px;
  margin-bottom:15px;
  box-shadow:0 5px 15px rgba(0,0,0,.3);
}

button{
  padding:10px 16px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  background:var(--primary);
  color:#fff;
  font-weight:bold;
}

button.secondary{background:#475569}
button.danger{background:var(--danger)}

input{
  width:100%;
  padding:10px;
  border-radius:8px;
  border:none;
  margin-top:10px;
}

.hidden{display:none}

.option{
  padding:12px;
  background:var(--secondary);
  border-radius:8px;
  margin:6px 0;
  cursor:pointer;
  transition:.2s;
}

.option:hover{background:#475569}

.option.selected{background:var(--primary)}

#timer{
  font-size:18px;
  margin-bottom:10px;
}

.progress{
  height:8px;
  background:#1e293b;
  border-radius:10px;
  overflow:hidden;
  margin-bottom:15px;
}

.progress-bar{
  height:100%;
  background:var(--primary);
  width:0%;
  transition:.3s;
}

.stat{
  display:flex;
  justify-content:space-between;
  margin:6px 0;
}

.small{
  font-size:13px;
  opacity:.7;
}

</style>
</head>

<body>
<div class="container">

<!-- LOGIN -->
<div id="login" class="card">
<h2>Giriş</h2>
<input id="name" placeholder="Ad Soyad">
<button onclick="App.start()">Başla</button>
</div>

<!-- QUIZ -->
<div id="quiz" class="hidden">
<div id="timer"></div>
<div class="progress"><div id="bar" class="progress-bar"></div></div>

<div class="card">
<h3 id="qText"></h3>
<div id="options"></div>
</div>

<div style="display:flex;gap:10px">
<button class="secondary" onclick="App.prev()">Geri</button>
<button onclick="App.next()">İleri</button>
</div>
</div>

<!-- RESULT -->
<div id="result" class="hidden card">
<h2>Sonuç</h2>
<p id="score"></p>

<div class="stat"><span>Doğru</span><span id="correct"></span></div>
<div class="stat"><span>Yanlış</span><span id="wrong"></span></div>
<div class="stat"><span>Boş</span><span id="blank"></span></div>

<p id="analysis" class="small"></p>

<button onclick="location.reload()">Yeniden Başla</button>
</div>

</div>

<script>
/* ================= CONFIG ================= */
const CONFIG = {
  SUPABASE_URL: "YOUR_URL",
  SUPABASE_KEY: "YOUR_KEY"
};

/* ================= CORE APP ================= */
const App = {

  state:{
    user:"",
    questions:[],
    index:0,
    answers:[],
    timer:null,
    timeLeft:600
  },

  init(){
    this.supabase = window.supabase.createClient(
      CONFIG.SUPABASE_URL,
      CONFIG.SUPABASE_KEY
    );

    this.loadQuestions();
  },

  loadQuestions(){
    this.state.questions = [
      {q:"Türkiye'nin başkenti?",a:["İstanbul","Ankara","İzmir","Bursa"],c:1,topic:"şehir"},
      {q:"En büyük okyanus?",a:["Atlas","Hint","Pasifik","Arktik"],c:2,topic:"coğrafya"},
      {q:"İklim elemanı değildir?",a:["Sıcaklık","Basınç","Nüfus","Yağış"],c:2,topic:"iklim"},
      {q:"Dünya'nın şekli?",a:["Düz","Küre","Silindir","Üçgen"],c:1,topic:"genel"}
    ];
  },

  start(){
    const name = document.getElementById('name').value.trim();
    if(!name) return alert("Ad gir");

    this.state.user = name;

    document.getElementById('login').classList.add('hidden');
    document.getElementById('quiz').classList.remove('hidden');

    this.startTimer();
    this.render();
  },

  render(){
    const q = this.state.questions[this.state.index];

    document.getElementById('qText').innerText = q.q;

    const box = document.getElementById('options');
    box.innerHTML="";

    q.a.forEach((opt,i)=>{
      const div = document.createElement('div');
      div.className="option";
      div.innerText=opt;

      if(this.state.answers[this.state.index]===i){
        div.classList.add('selected');
      }

      div.onclick=()=>this.select(i);
      box.appendChild(div);
    });

    this.updateBar();
  },

  select(i){
    this.state.answers[this.state.index]=i;
    this.render();
  },

  next(){
    if(this.state.index < this.state.questions.length-1){
      this.state.index++;
      this.render();
    }else{
      this.finish();
    }
  },

  prev(){
    if(this.state.index>0){
      this.state.index--;
      this.render();
    }
  },

  startTimer(){
    this.state.timer = setInterval(()=>{
      this.state.timeLeft--;

      const m = Math.floor(this.state.timeLeft/60);
      const s = this.state.timeLeft%60;

      document.getElementById('timer').innerText =
        `${m}:${s<10?'0':''}${s}`;

      if(this.state.timeLeft<=0){
        clearInterval(this.state.timer);
        this.finish();
      }
    },1000);
  },

  calculate(){
    let correct=0, blank=0;

    this.state.questions.forEach((q,i)=>{
      const a = this.state.answers[i];
      if(a===undefined) blank++;
      else if(a===q.c) correct++;
    });

    const total = this.state.questions.length;
    const wrong = total - correct - blank;
    const score = Math.round((correct/total)*100);

    return {correct,wrong,blank,score};
  },

  analyze(){
    const map={};

    this.state.questions.forEach((q,i)=>{
      if(!map[q.topic]) map[q.topic]={t:0,c:0};

      map[q.topic].t++;

      if(this.state.answers[i]===q.c){
        map[q.topic].c++;
      }
    });

    let worst = "";
    let min = 1;

    Object.entries(map).forEach(([k,v])=>{
      const rate = v.c/v.t;
      if(rate < min){
        min = rate;
        worst = k;
      }
    });

    return `En zayıf konun: ${worst}`;
  },

  async finish(){
    clearInterval(this.state.timer);

    const r = this.calculate();

    document.getElementById('quiz').classList.add('hidden');
    document.getElementById('result').classList.remove('hidden');

    document.getElementById('score').innerText = "Puan: "+r.score;
    document.getElementById('correct').innerText = r.correct;
    document.getElementById('wrong').innerText = r.wrong;
    document.getElementById('blank').innerText = r.blank;

    document.getElementById('analysis').innerText = this.analyze();

    await this.saveResult(r);
  },

  async saveResult(r){
    try{
      await this.supabase.from('results').insert([{
        student_name:this.state.user,
        ...r
      }]);
    }catch(e){
      console.error("DB hata:",e);
    }
  },

  updateBar(){
    const pct = ((this.state.index+1)/this.state.questions.length)*100;
    document.getElementById('bar').style.width = pct+"%";
  }

};

App.init();
</script>
</body>
</html>
```
