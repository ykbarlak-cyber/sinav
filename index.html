<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Çakma Yapay Zeka Sınav Sistemi - Ultimate</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
body { font-family: Arial, sans-serif; margin:20px; background:#f5f5f5; }
h1,h2{color:#333;} 
.container{max-width:950px;margin:auto;background:white;padding:20px;border-radius:8px;box-shadow:0 0 15px rgba(0,0,0,0.15);}
.student, .exam, .ai { margin-top:20px; padding:15px; border:1px solid #ddd; border-radius:5px; background:#fafafa;}
input, select, button, textarea {padding:8px;margin:5px 0;width:100%;border-radius:4px;border:1px solid #ccc;}
button{background:#4CAF50;color:white;border:none;cursor:pointer;}
button:hover{background:#45a049;}
.question{margin-bottom:15px;}
</style>
</head>
<body>
<div class="container">
<h1>Çakma Yapay Zeka Sınav Sistemi - Ultimate</h1>

<div class="student">
<h2>Öğrenci Kaydı</h2>
<input type="text" id="stuName" placeholder="Ad Soyad">
<input type="text" id="stuEmail" placeholder="Email">
<button onclick="registerStudent()">Kaydet</button>
<p id="stuMsg"></p>
</div>

<div class="exam">
<h2>Sınav</h2>
<select id="examTopic">
  <option value="matematik">Matematik</option>
  <option value="coğrafya">Coğrafya</option>
  <option value="fen">Fen</option>
</select>
<button onclick="startExam()">Sınavı Başlat</button>
<div id="examArea"></div>
<p id="examMsg"></p>
</div>

<div class="ai">
<h2>Çakma AI Yardım</h2>
<textarea id="aiQuery" placeholder="Soru sor veya ipucu al..."></textarea>
<button onclick="aiAnswer()">Sor</button>
<p id="aiResponse"></p>
</div>
</div>

<script>
// --- Supabase Bağlantısı ---
const SUPABASE_URL = "https://YOUR_SUPABASE_URL.supabase.co";
const SUPABASE_KEY = "YOUR_SUPABASE_ANON_KEY";
const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// --- Öğrenci Kaydı ---
async function registerStudent(){
  const name = document.getElementById('stuName').value;
  const email = document.getElementById('stuEmail').value;
  if(!name || !email){document.getElementById('stuMsg').innerText="İsim ve email gerekli!"; return;}
  const {data,error} = await supabase.from('students').insert([{name,email}]);
  if(error){document.getElementById('stuMsg').innerText="Hata: "+error.message;} 
  else {document.getElementById('stuMsg').innerText="Kayıt başarılı!";}
}

// --- 1100+ Otomatik Soru Üretimi ---
function generateQuestions(topic){
  let questions=[];
  for(let i=1;i<=1100;i++){
    questions.push({
      q:`${topic} sorusu #${i}?`,
      a:[`${i}`,`${i+1}`,`${i+2}`,`${i+3}`],
      correct:i%4
    });
  }
  return questions;
}

// --- Sınav Başlat ---
function startExam(){
  const topic = document.getElementById('examTopic').value;
  const examArea = document.getElementById('examArea');
  examArea.innerHTML="";
  const qList = generateQuestions(topic);
  qList.slice(0,10).forEach((q,i)=>{ // İlk 10 soruyu göster
    let div = document.createElement('div');
    div.className="question";
    div.innerHTML=`<p>${i+1}. ${q.q}</p>
      ${q.a.map((opt,j)=>`<label><input type="radio" name="q${i}" value="${j}"> ${opt}</label><br>`).join('')}`;
    examArea.appendChild(div);
  });
  let btn = document.createElement('button');
  btn.innerText="Cevapla";
  btn.onclick=()=>submitExam(topic,qList.slice(0,10));
  examArea.appendChild(btn);
}

// --- Sınav Gönder ---
async function submitExam(topic,qList){
  let score=0;
  qList.forEach((q,i)=>{
    const radios = document.getElementsByName('q'+i);
    for(let r of radios){if(r.checked && parseInt(r.value)===q.correct) score++;}
  });
  document.getElementById('examMsg').innerText=`Puanınız: ${score} / ${qList.length}`;
  const email = document.getElementById('stuEmail').value;
  if(email){
    await supabase.from('results').insert([{email,topic,score,date:new Date()}]);
  }
}

// --- Çakma AI ---
function aiAnswer(){
  const query = document.getElementById('aiQuery').value.toLowerCase();
  let answer="";
  if(query.includes("ipucu")||query.includes("yardım")){
    answer="Sınav ipucu: Soruyu dikkatle oku, seçenekleri değerlendir, mantık kur.";
  } else if(query.includes("2+2")){
    answer="Cevap 4!";
  } else if(query.includes("başkent")){
    answer="Türkiye'nin başkenti Ankara'dır.";
  } else if(query.includes("soru")){
    answer="Örnek soru: 5*5=? Cevap 25.";
  } else { answer="Bunu çözmek için daha fazla bilgiye ihtiyacım var."; }
  document.getElementById('aiResponse').innerText=answer;
}

// --- Otomatik tablo yaratma (Supabase) ---
async function createTables(){
  try{
    await supabase.rpc('sql', {sql:"CREATE TABLE IF NOT EXISTS students(id serial primary key,name text,email text unique);" });
    await supabase.rpc('sql', {sql:"CREATE TABLE IF NOT EXISTS results(id serial primary key,email text,topic text,score int,date timestamp);" });
  }catch(e){console.log(e);}
}
createTables();
</script>
</body>
</html>
